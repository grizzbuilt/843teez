<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4PVF756J01"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){ dataLayer.push(arguments); }
      gtag('js', new Date());
      gtag('config', 'G-4PVF756J01');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #f8fcff;
            background-image: url('https://843teez.com/surf-texture.png');
            background-repeat: repeat;
            background-size: 300px;
        }
        .btn-primary { background-color: #003466; }
        .btn-primary:hover { background-color: #007c9e; }
    </style>

    <title>843 Teez | Finalize Order</title>
</head>

<body class="min-h-screen p-4 sm:p-8 pt-16">

    <!-- Banner -->
    <div class="w-full bg-amber-400 text-amber-900 text-center py-3 px-4 shadow-md text-base fixed top-0 z-50">
        <p class="font-bold mb-1">Big things are happening! The new 843 Teez online store is under construction.</p>
    </div>

    <div class="max-w-6xl mx-auto p-6 sm:p-10 bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl">

        <!-- Header -->
        <header class="text-center mb-8">
            <img src="https://843teez.com/843teezlogo.png" class="max-w-xs mx-auto mb-4 w-5/6">
            <h1 class="text-3xl font-extrabold text-[#007c9e]">Finalize Order Request</h1>
            <p class="text-sm text-gray-600">Provide shipping/contact details and we’ll email the invoice.</p>
        </header>

        <!-- Checkout Form -->
        <div class="max-w-3xl mx-auto">

            <form 
                name="843Teez_Order"
                method="POST"
                data-netlify="true"
                data-netlify-honeypot="bot-field"
                action="/confirmation.html"
                class="space-y-4 bg-white p-6 rounded-xl border-2 border-[#007c9e] shadow-lg"
            >

                <input type="hidden" name="form-name" value="843Teez_Order">
                <input type="hidden" name="cart_data_json" id="cart-data-json">
                <input type="hidden" name="bot-field">

                <!-- Contact Fields -->
                <div>
                    <label class="block text-sm font-medium">Full Name</label>
                    <input type="text" name="name" required class="w-full p-2 border rounded-lg">
                </div>

                <div>
                    <label class="block text-sm font-medium">Email (Invoice Sent Here)</label>
                    <input type="email" name="email" required class="w-full p-2 border rounded-lg">
                </div>

                <div>
                    <label class="block text-sm font-medium">Phone Number</label>
                    <input type="tel" name="phone" class="w-full p-2 border rounded-lg">
                </div>

                <!-- Shipping -->
                <div>
                    <label class="block text-sm font-medium">Shipping Method</label>
                    <select name="shipping_method" id="shipping_method" required class="w-full p-2 border rounded-lg" onchange="toggleAddressFields(); updateTotals();">
                        <option value="" disabled selected>Select an option…</option>
                        <option value="local_pickup">Local Pickup (FREE)</option>
                        <option value="standard_shipping">Standard Shipping — $8.00</option>
                    </select>
                </div>

                <!-- Shipping Address -->
                <div id="shipping-fields" class="hidden space-y-3 border-l-4 border-red-200 pl-4">
                    <input type="text" name="full_address" id="full_address" placeholder="Street Address" class="w-full p-2 border rounded-lg">
                    <div class="grid grid-cols-3 gap-3">
                        <input type="text" name="city" id="city" placeholder="City" class="p-2 border rounded-lg">
                        <input type="text" name="state" id="state" placeholder="State" maxlength="2" class="p-2 border rounded-lg">
                        <input type="text" name="zip_code" id="zip_code" placeholder="Zip Code" maxlength="10" class="p-2 border rounded-lg">
                    </div>
                </div>

                <!-- Order Summary -->
                <div class="mt-6 pt-4 border-t">
                    <h3 class="text-xl font-bold text-[#003466] mb-2">Order Summary</h3>

                    <div class="flex justify-between">
                        <span>Subtotal:</span>
                        <span id="subtotal-display">$0.00</span>
                    </div>
                    <div class="flex justify-between text-red-600">
                        <span>Tax (8%):</span>
                        <span id="tax-display">$0.00</span>
                    </div>
                    <div class="flex justify-between">
                        <span>Shipping:</span>
                        <span id="shipping-display">$0.00</span>
                    </div>
                    <div class="flex justify-between text-xl font-bold text-red-500 border-t pt-2 mt-2">
                        <span>Total:</span>
                        <span id="total-display">$0.00</span>
                    </div>
                </div>

                <button type="submit" class="w-full mt-6 text-white font-bold py-3 rounded-xl btn-primary">
                    Confirm Order & Request Invoice
                </button>

            </form>
        </div>

        <footer class="text-center mt-12 pt-6 text-[#003466] text-xs font-semibold">
            <p>843 Teez™ • A GrizzBuilt™ Brand • Conway, SC</p>
        </footer>
    </div>

    <!-- Pricing Logic -->
    <script>
        const TAX_RATE = 0.08;
        const SHIPPING = { local_pickup: 0, standard_shipping: 8 };

        let cart = JSON.parse(localStorage.getItem("843teez_cart")) || [];

        const format = x => `$${x.toFixed(2)}`;

        function toggleAddressFields() {
            const method = document.getElementById("shipping_method").value;
            document.getElementById("shipping-fields")
                .classList.toggle("hidden", method !== "standard_shipping");
        }

        function updateTotals() {
            let subtotal = 0;

            // FIXED: qty instead of quantity
            cart.forEach(item => subtotal += item.price * item.qty);

            const method = document.getElementById("shipping_method").value;
            const shipping = SHIPPING[method] || 0;
            const tax = subtotal * TAX_RATE;
            const total = subtotal + tax + shipping;

            document.getElementById("subtotal-display").textContent = format(subtotal);
            document.getElementById("tax-display").textContent = format(tax);
            document.getElementById("shipping-display").textContent = format(shipping);
            document.getElementById("total-display").textContent = format(total);

            // Correct structured JSON for Netlify
            document.getElementById("cart-data-json").value = JSON.stringify({
                items: cart.map(i => ({
                    id: i.id,
                    name: i.name,
                    apparelType: i.apparelType,
                    color: i.color,
                    size: i.size,
                    price: i.price,
                    qty: i.qty
                })),
                subtotal,
                tax,
                shipping,
                total
            });
        }

        window.onload = updateTotals;
    </script>

</body>
</html>
