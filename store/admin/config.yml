backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "store"        # Where uploaded images are saved (relative to repo root)
public_folder: "/store"      # Public URL path

collections:
  - name: "store_products"
    label: "🛒 Store Products"
    files:
      - label: "Products"
        name: "products"
        file: "store/data/products.json"   # IMPORTANT: products.json MUST be inside /store/data

        editor:
          preview: false

        fields:
          - label: "Product List"
            name: "products"
            widget: "list"
            summary: "{{fields.name}} (ID: {{fields.id}})"

            fields:
              - label: "Product ID"
                name: "id"
                widget: "string"
                required: true

              - label: "Product Name"
                name: "name"
                widget: "string"
                required: true

              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - Originals
                  - Fall
                  - Christmas
                  - LE

              - label: "Apparel Types"
                name: "product_options"
                widget: "list"
                field:
                  label: "Type"
                  name: "type"
                  widget: "select"
                  options:
                    - Tee_Shirt
                    - Sweatshirt
                    - Hoodie
                    - Baseball_Tee

              - label: "Available Colors"
                name: "colors"
                widget: "list"
                field:
                  label: "Color"
                  name: "color"
                  widget: "string"

              - label: "Image URLs"
                name: "imageUrls"
                widget: "list"
                field:
                  label: "Image URL"
                  name: "url"
                  widget: "string"
                  hint: "Path to image (ex: ../store/filename.png)"
