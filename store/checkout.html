<!--
  File: store/checkout.html
  Purpose:
  - Collect customer contact and delivery details
  - Calculate subtotal, tax, shipping, and total
  - Submit the order request through Netlify Forms
  - Pass cart contents and totals through a hidden JSON field

  Notes:
  - Cart items are stored in localStorage under "843teez_cart"
  - Supports legacy and current cart field names:
      qty <-> quantity
      apparelType <-> type
  - Local pickup requires pickup instructions
  - Standard shipping requires shipping address fields
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4PVF756J01"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){ dataLayer.push(arguments); }
      gtag('js', new Date());
      gtag('config', 'G-4PVF756J01');
    </script>

    <meta name="robots" content="noindex, follow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <title>843 Teez | Finalize Order</title>

    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #f8fcff;
            background-image: url('https://843teez.com/surf-texture.png');
            background-repeat: repeat;
            background-size: 300px;
        }

        .btn-primary {
            background-color: #003466;
        }

        .btn-primary:hover {
            background-color: #007c9e;
        }
    </style>
</head>

<body class="min-h-screen p-4 sm:p-8 pt-16">

<div class="max-w-6xl mx-auto p-6 sm:p-10 bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl">

    <header class="text-center mb-8">
        <img src="https://843teez.com/843teezlogo.png" alt="843 Teez Logo" class="max-w-xs mx-auto mb-4 w-5/6">
        <h1 class="text-3xl font-extrabold text-[#007c9e]">Finalize Order Request</h1>
        <p class="text-sm text-gray-600">Provide pickup or shipping details and receive your invoice.</p>
    </header>

    <div class="max-w-3xl mx-auto">

        <form
            name="843Teez_Order"
            method="POST"
            data-netlify="true"
            data-netlify-honeypot="bot-field"
            action="/confirmation.html"
            class="space-y-4 bg-white p-6 rounded-xl border-2 border-[#007c9e] shadow-lg"
        >
            <input type="hidden" name="form-name" value="843Teez_Order">
            <input type="hidden" name="cart_data_json" id="cart-data-json">
            <input type="hidden" name="bot-field">

            <!-- CONTACT -->
            <div>
                <label class="block text-sm font-medium" for="name">Full Name</label>
                <input type="text" id="name" name="name" required class="w-full p-2 border rounded-lg">
            </div>

            <div>
                <label class="block text-sm font-medium" for="email">Email (Invoice Goes Here)</label>
                <input type="email" id="email" name="email" required class="w-full p-2 border rounded-lg">
            </div>

            <div>
                <label class="block text-sm font-medium" for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" class="w-full p-2 border rounded-lg">
            </div>

            <!-- SHIPPING METHOD -->
            <div>
                <label class="block text-sm font-medium" for="shipping_method">Shipping Method</label>
                <select
                    name="shipping_method"
                    id="shipping_method"
                    required
                    class="w-full p-2 border rounded-lg"
                >
                    <option value="" disabled selected>Select an option…</option>
                    <option value="local_pickup">Local Pickup (FREE)</option>
                    <option value="standard_shipping">Standard Shipping — $8.00</option>
                </select>
            </div>

            <!-- PICKUP INSTRUCTIONS -->
            <div id="pickup-fields" class="hidden space-y-3 border-l-4 border-green-200 pl-4">
                <label class="block text-sm font-medium" for="pickup_instructions">Local Pickup Instructions</label>
                <textarea
                    name="pickup_instructions"
                    id="pickup_instructions"
                    class="w-full p-2 border rounded-lg"
                    placeholder="Best way to contact you to arrange pickup (call/text/email)…"
                    rows="3"
                ></textarea>
            </div>

            <!-- SHIPPING ADDRESS -->
            <div id="shipping-fields" class="hidden space-y-3 border-l-4 border-red-200 pl-4">
                <input type="text" id="full_address" name="full_address" placeholder="Street Address" class="w-full p-2 border rounded-lg">
                <div class="grid grid-cols-3 gap-3">
                    <input type="text" id="city" name="city" placeholder="City" class="p-2 border rounded-lg">
                    <input type="text" id="state" name="state" placeholder="State" maxlength="2" class="p-2 border rounded-lg">
                    <input type="text" id="zip_code" name="zip_code" placeholder="Zip Code" maxlength="10" class="p-2 border rounded-lg">
                </div>
            </div>

            <!-- ORDER SUMMARY -->
            <div class="mt-6 pt-4 border-t">
                <h3 class="text-xl font-bold text-[#003466] mb-2">Order Summary</h3>

                <div class="flex justify-between">
                    <span>Subtotal:</span>
                    <span id="subtotal-display">$0.00</span>
                </div>

                <div class="flex justify-between text-red-600">
                    <span>Tax (8%):</span>
                    <span id="tax-display">$0.00</span>
                </div>

                <div class="flex justify-between">
                    <span>Shipping:</span>
                    <span id="shipping-display">$0.00</span>
                </div>

                <div class="flex justify-between text-xl font-bold text-red-500 border-t pt-2 mt-2">
                    <span>Total:</span>
                    <span id="total-display">$0.00</span>
                </div>
            </div>

            <button type="submit" id="submit-order-button" class="w-full mt-6 text-white font-bold py-3 rounded-xl btn-primary">
                Confirm Order & Request Invoice
            </button>
        </form>
    </div>

    <footer class="text-center mt-12 pt-6 text-[#003466] text-xs font-semibold">
        <p>843 Teez™ • A GrizzBuilt™ Brand • Conway, SC</p>
    </footer>

</div>

<script>
/* -------------------------------
   FILE: store/checkout.html
   PURPOSE:
   - Read cart data from localStorage
   - Normalize cart item structure
   - Show running totals with tax + shipping
   - Toggle pickup/shipping fields
   - Submit cart summary to Netlify form
-------------------------------- */

const TAX_RATE = 0.08;
const SHIPPING = {
    local_pickup: 0,
    standard_shipping: 8
};

const getStoredCart = () => {
    try {
        const raw = JSON.parse(localStorage.getItem("843teez_cart")) || [];
        return Array.isArray(raw) ? raw : [];
    } catch (error) {
        console.error("Could not parse cart from localStorage:", error);
        return [];
    }
};

let cart = getStoredCart();

const format = (x) => `$${Number(x || 0).toFixed(2)}`;

const normalizeCartItem = (item) => {
    const quantity = Number(item.quantity ?? item.qty ?? 0);
    const type = item.type ?? item.apparelType ?? "";

    return {
        id: item.id ?? "",
        name: item.name ?? "Unnamed Item",
        type,
        price: Number(item.price ?? 0),
        size: item.size ?? "",
        color: item.color ?? "",
        quantity: quantity > 0 ? quantity : 0
    };
};

const normalizeCart = () => {
    cart = cart
        .map(normalizeCartItem)
        .filter(item => item.quantity > 0);

    localStorage.setItem("843teez_cart", JSON.stringify(cart));
};

function setShippingFieldRequirements(enabled) {
    const address = document.getElementById("full_address");
    const city = document.getElementById("city");
    const state = document.getElementById("state");
    const zip = document.getElementById("zip_code");

    if (enabled) {
        address.setAttribute("required", "true");
        city.setAttribute("required", "true");
        state.setAttribute("required", "true");
        zip.setAttribute("required", "true");
    } else {
        address.removeAttribute("required");
        city.removeAttribute("required");
        state.removeAttribute("required");
        zip.removeAttribute("required");
    }
}

function toggleAddressFields() {
    const method = document.getElementById("shipping_method").value;

    const shipBox = document.getElementById("shipping-fields");
    const pickupBox = document.getElementById("pickup-fields");
    const pickupInput = document.getElementById("pickup_instructions");

    if (method === "standard_shipping") {
        shipBox.classList.remove("hidden");
        pickupBox.classList.add("hidden");
        pickupInput.removeAttribute("required");
        setShippingFieldRequirements(true);
    } else if (method === "local_pickup") {
        shipBox.classList.add("hidden");
        pickupBox.classList.remove("hidden");
        pickupInput.setAttribute("required", "true");
        setShippingFieldRequirements(false);
    } else {
        shipBox.classList.add("hidden");
        pickupBox.classList.add("hidden");
        pickupInput.removeAttribute("required");
        setShippingFieldRequirements(false);
    }

    updateTotals();
}

function updateTotals() {
    let subtotal = 0;

    cart.forEach(item => {
        subtotal += item.price * item.quantity;
    });

    const method = document.getElementById("shipping_method").value;
    const shipping = SHIPPING[method] || 0;
    const tax = subtotal * TAX_RATE;
    const total = subtotal + tax + shipping;

    document.getElementById("subtotal-display").textContent = format(subtotal);
    document.getElementById("tax-display").textContent = format(tax);
    document.getElementById("shipping-display").textContent = format(shipping);
    document.getElementById("total-display").textContent = format(total);

    document.getElementById("cart-data-json").value = JSON.stringify({
        items: cart,
        subtotal,
        tax,
        shipping_method: method || "",
        shipping,
        total
    });

    const submitBtn = document.getElementById("submit-order-button");
    submitBtn.disabled = cart.length === 0;
    submitBtn.classList.toggle("opacity-50", cart.length === 0);
    submitBtn.classList.toggle("cursor-not-allowed", cart.length === 0);
}

document.getElementById("shipping_method").addEventListener("change", toggleAddressFields);

window.onload = () => {
    normalizeCart();
    toggleAddressFields();
    updateTotals();
};
</script>

</body>
</html>
