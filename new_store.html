<html lang="en">
<head>

  <meta name="robots" content="noindex, follow">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>843 Teez | All Designs</title>
  <meta name="description" content="Browse all 843 Teez custom designs — Conway SC inspired apparel, printed in-house.">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #f8fcff;

      background-size: 300px;

    }

    .btn-primary:hover { background: #007c9e; }

    .product-image-container { position: relative; cursor: pointer; }
    .image-overlay {
      position: absolute; inset: 0;

    .modal-visible {

      align-items: center;

<body class="min-h-screen p-4 sm:p-8 pt-16">

<div class="max-w-6xl mx-auto p-6 sm:p-10 bg-white/80 rounded-2xl shadow-xl backdrop-blur-sm">

<header class="text-center mb-8">
  <img src="/843teezlogo.png" alt="843 Teez Logo" class="max-w-xs mx-auto mb-4 w-5/6">
  <h1 class="text-3xl font-extrabold text-[#007c9e]">All 843 Teez Designs</h1>

  <a href="cart.html" id="global-view-cart-button"
     class="inline-flex bg-red-600 text-white font-bold px-3 py-1 mt-3 rounded-full shadow-md disabled:opacity-50"
     disabled>
    Cart (<span id="global-item-count">0</span>)
  </a>
</header>

<div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
  <div class="lg:col-span-3">
    <div id="product-grid"
      class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
      <p class="col-span-3 text-center text-gray-500 pt-8">Loading products...</p>
    </div>
  </div>

  <div class="lg:col-span-1">
    <div class="sticky top-20 bg-white p-4 rounded-xl border-2 border-[#007c9e] shadow-lg text-center">
      <h3 class="text-lg font-bold text-[#003466] mb-3">Your Cart Summary</h3>
      <p>Total Items: <span id="summary-item-count">0</span></p>
      <p class="text-xl font-bold">Est. Total: <span id="summary-cart-total">$0.00</span></p>
      <a href="cart.html" id="view-cart-button"
         class="mt-4 inline-block w-full text-white font-bold py-3 rounded-xl btn-primary disabled:opacity-50"
         disabled>
        Review & Checkout
      </a>
    </div>
  </div>
</div>

</div>

<!-- SETTINGS -->
<script>
let STORE_SETTINGS = {
  store_open: true,
  tax_rate: 0.08,
  shipping_standard: 8,
  store_message: ""
};

async function loadStoreSettings() {
  try {
    const res = await fetch("/data/settings.json?t=" + Date.now());
    STORE_SETTINGS = await res.json();

    if (!STORE_SETTINGS.store_open) {
      document.body.innerHTML = `
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
          <div style="text-align:center;">
            <h1 style="font-size:2rem;font-weight:bold;">Store Temporarily Closed</h1>
            <p>${STORE_SETTINGS.store_message || "Please check back soon."}</p>
          </div>
        </div>`;
      return false;
    }

    return true;
  } catch (err) {
    console.error("Settings load failed:", err);
    return true; 
  }
}
</script>

<!-- STORE LOGIC -->
<script>
const ALL_SIZES = ["S","M","L","XL","2XL","3XL","4XL","5XL"];
let cart = JSON.parse(localStorage.getItem("843teez_cart")) || [];
let allProducts = [];

const formatCurrency = amt => `$${Number(amt).toFixed(2)}`;

const computePrice = (product, type, size) =>
  (product.base_prices?.[type] || 0) +
  (product.size_upcharges?.[size] || 0);

const getLowestBasePrice = product =>
  Math.min(...Object.values(product.base_prices || {}).map(Number));

const updateCartSummary = () => {
  let subtotal = 0, totalItems = 0;
  cart.forEach(i => {
    subtotal += i.price * i.qty;
    totalItems += i.qty;
  });

  const tax = subtotal * STORE_SETTINGS.tax_rate;

  document.getElementById("summary-item-count").textContent = totalItems;
  document.getElementById("global-item-count").textContent = totalItems;
  document.getElementById("summary-cart-total").textContent =
    formatCurrency(subtotal + tax);

  const btn = document.getElementById("view-cart-button");
  totalItems ? btn.removeAttribute("disabled") : btn.setAttribute("disabled","");
};

const addToCart = item => {
  const existing = cart.find(i =>
    i.id === item.id &&
    i.apparelType === item.apparelType &&
    i.color === item.color &&
    i.size === item.size
  );

  if (existing) existing.qty++;
  else cart.push({...item, qty:1});

  localStorage.setItem("843teez_cart", JSON.stringify(cart));
  updateCartSummary();
};

async function initStore() {
  const res = await fetch("/data/products.json");
  const data = await res.json();
  allProducts = data.products || [];

  const grid = document.getElementById("product-grid");
  grid.innerHTML = allProducts.map(p => `
    <div class="bg-white p-4 rounded-xl shadow product-card" data-product-id="${p.id}">
      <img src="${p.thumbnail}" class="rounded mb-2">
      <h3 class="font-bold">${p.name}</h3>

      <select class="apparel-type">
        ${p.product_options.map(t => 
          `<option value="${t}">${t.replace(/_/g," ")} - ${formatCurrency(p.base_prices[t])}</option>`
        ).join("")}
      </select>

      <select class="apparel-size mt-2">
        ${ALL_SIZES.map(s => 
          `<option value="${s}">${s}</option>`
        ).join("")}
      </select>

      <button class="btn-primary mt-3 add-to-cart w-full text-white py-2 rounded">Add To Cart</button>
    </div>
  `).join("");

  document.querySelectorAll(".product-card").forEach(card => {
    const product = allProducts.find(
      p => p.id === card.dataset.productId
    );

    const typeSel = card.querySelector(".apparel-type");
    const sizeSel = card.querySelector(".apparel-size");
    const btn = card.querySelector(".add-to-cart");

    btn.addEventListener("click", () => {
      addToCart({
        id: product.id,
        name: product.name,
        apparelType: typeSel.value,
        color: product.colors[0],
        size: sizeSel.value,
        price: computePrice(product, typeSel.value, sizeSel.value)
      });
    });
  });

  updateCartSummary();
}
</script>

<!-- INIT -->
<script>
window.onload = async () => {
  const storeIsOpen = await loadStoreSettings();
  if (!storeIsOpen) return;
  initStore();
};
</script>

</body>
</html>
