<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4PVF756J01"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){ dataLayer.push(arguments); }
gtag('js', new Date());
gtag('config', 'G-4PVF756J01');
</script>

<meta name="robots" content="noindex, follow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>843 Teez | All Designs</title>
<meta name="description" content="Browse all 843 Teez custom designs — Conway SC inspired apparel, printed in-house.">

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', system-ui, sans-serif;
    background-color: #f8fcff;
    background-image: url('https://843teez.com/surf-texture.png');
    background-size: 300px;
    background-repeat: repeat;
}
.btn-primary { background: #003466; }
.btn-primary:hover { background: #007c9e; }

.product-image-container { position: relative; cursor: pointer; }
.image-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.4);
    opacity: 0; color: #fff; font-weight: bold;
    transition: .3s;
}
.product-image-container:hover .image-overlay { opacity: 1; }
</style>
</head>

<body class="min-h-screen p-4 sm:p-8 pt-16">

<div class="max-w-6xl mx-auto p-6 sm:p-10 bg-white/80 rounded-2xl shadow-xl backdrop-blur-sm">

<header class="text-center mb-8">
<img src="/843teezlogo.png" class="max-w-xs mx-auto mb-4 w-5/6">
<h1 class="text-3xl font-extrabold text-[#007c9e]">All 843 Teez Designs</h1>
</header>

<div class="grid grid-cols-1 lg:grid-cols-4 gap-8">

<div class="lg:col-span-3">
<h2 class="text-2xl sm:text-3xl font-bold text-[#003466] mb-6 border-b pb-2">All Apparel Designs</h2>
<div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
<p class="col-span-3 text-center text-gray-500 pt-8">Loading products...</p>
</div>
</div>

<div class="lg:col-span-1">
<div class="sticky top-20 bg-white p-4 rounded-xl border-2 border-[#007c9e] shadow-lg text-center">
<h3 class="text-lg font-bold text-[#003466] mb-3">Your Cart Summary</h3>
<p>Total Items: <span id="summary-item-count">0</span></p>
<p class="text-xl font-bold">Est. Total: <span id="summary-cart-total">$0.00</span></p>
</div>
</div>

</div>
</div>

<script>
const ALL_SIZES = ["S","M","L","XL","2XL","3XL","4XL","5XL"];
let cart = JSON.parse(localStorage.getItem("843teez_cart")) || [];
let allProducts = [];

const formatCurrency = amount => `$${amount.toFixed(2)}`;

const computePrice = (product, type, size) => {
    const base = product.base_prices[type] || 0;
    const up = product.size_upcharges[size] || 0;
    return base + up;
};

const updateCartSummary = () => {
    let items = 0, total = 0;
    cart.forEach(i => {
        items += i.qty;
        total += i.price * i.qty;
    });

    document.getElementById("summary-item-count").textContent = items;
    document.getElementById("summary-cart-total").textContent = formatCurrency(total);
};

const addToCart = (item) => {
    const match = cart.find(c =>
        c.id === item.id &&
        c.apparelType === item.apparelType &&
        c.color === item.color &&
        c.size === item.size
    );

    if (match) match.qty++;
    else cart.push({...item, qty: 1});

    localStorage.setItem("843teez_cart", JSON.stringify(cart));
    updateCartSummary();
};

const initStore = async () => {
    const res = await fetch("/data/products.json");
    const json = await res.json();
    allProducts = json.products || [];
    renderProducts();
    updateCartSummary();
};

const renderProducts = () => {
    const grid = document.getElementById("product-grid");

    grid.innerHTML = allProducts.map(product => {
        const lowest = Math.min(...Object.values(product.base_prices));

        return `
        <div class="bg-white p-4 rounded-xl shadow-lg">

            <img src="${product.thumbnail}" class="rounded mb-2">

            <h3 class="font-bold text-[#003466]">${product.name}</h3>
            <p class="text-[#007c9e] font-bold">Starting at ${formatCurrency(lowest)}</p>

            <label class="block text-xs mt-2 font-bold">Style</label>
            <select class="apparel-type w-full border p-1">
                ${product.product_options.map(o => `
                    <option value="${o}">
                        ${o.replace(/_/g," ")} — ${formatCurrency(product.base_prices[o])}
                    </option>
                `).join("")}
            </select>

            <label class="block text-xs mt-2 font-bold">Color</label>
            <select class="apparel-color w-full border p-1">
                ${product.colors.map(c => `<option>${c.replace(/_/g," ")}</option>`).join("")}
            </select>

            <label class="block text-xs mt-2 font-bold">Size</label>
            <select class="apparel-size w-full border p-1">
                ${ALL_SIZES.map(s => {
                    const up = product.size_upcharges[s] || 0;
                    return `<option value="${s}">
                        ${s}${up > 0 ? ` (+${formatCurrency(up)})` : ""}
                    </option>`;
                }).join("")}
            </select>

            <p class="price-line text-red-600 font-bold mt-2"></p>

            <button class="btn-primary text-white w-full mt-3 py-2 add-to-cart">Add to Cart</button>

        </div>
        `;
    }).join("");

    attachBehavior();
};

const attachBehavior = () => {
    document.querySelectorAll(".add-to-cart").forEach((btn, i) => {
        const card = btn.closest("div");
        const product = allProducts[i];

        const typeSel = card.querySelector(".apparel-type");
        const colorSel = card.querySelector(".apparel-color");
        const sizeSel  = card.querySelector(".apparel-size");
        const priceLine = card.querySelector(".price-line");

        const update = () => {
            priceLine.textContent = formatCurrency(
                computePrice(product, typeSel.value, sizeSel.value)
            );
        };

        update();
        typeSel.addEventListener("change", update);
        sizeSel.addEventListener("change", update);

        btn.addEventListener("click", () => {
            addToCart({
                id: product.id,
                name: product.name,
                apparelType: typeSel.value,
                color: colorSel.value,
                size: sizeSel.value,
                price: computePrice(product, typeSel.value, sizeSel.value)
            });
        });
    });
};

window.onload = initStore;
</script>

</body>
</html>
