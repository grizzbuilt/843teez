<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>843 Teez Admin Panel</title>

  <!-- Decap CMS Stylesheet -->
  <link rel="stylesheet" href="https://unpkg.com/decap-cms@3.9.0/dist/cms.css" />

  <!-- Branding Styles -->
  <style>
    body {
      background: #f3f9fc;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    .admin-header {
      width: 100%;
      background: #008bba;
      color: white;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.15);
    }

    .admin-header img {
      height: 42px;
    }

    .admin-header-title {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: .5px;
    }

    .return-link {
      margin-left: auto;
      font-size: 0.95rem;
      color: white;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.6);
      padding: 6px 12px;
      border-radius: 4px;
      transition: all .2s ease-in-out;
    }

    .return-link:hover {
      background: rgba(255,255,255,0.2);
    }

    #nc-root {
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <!-- Custom Branded Header -->
  <div class="admin-header">
    <img src="/843teezlogo.png" alt="843 Teez Logo" />
    <span class="admin-header-title">843 Teez — Admin Panel</span>
    <a class="return-link" href="https://843teez.com" target="_blank">Return to Store →</a>
  </div>

  <!-- CMS Mount Point -->
  <div id="nc-root"></div>

  <!-- Netlify Identity Widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <!-- MUST COME BEFORE CMS SCRIPT — prevents auto-init -->
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>

  <!-- Decap CMS Script -->
  <script src="https://unpkg.com/decap-cms@3.9.0/dist/decap-cms.js"></script>

  <!-- Initialize CMS AFTER it loads -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      CMS.init();

      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) window.netlifyIdentity.open();
        });
      }
    });
  </script>

</body>
</html>
