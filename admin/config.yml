backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "store"
public_folder: "/store"

collections:
  - name: "store_products"
    label: "🛒 Store Products"
    file: "data/products.json"      # <-- SINGLE FILE, not a folder
    editor:
      preview: false
    fields:
      - label: "Product List"
        name: "products"
        widget: "list"
        summary: "{{fields.name}} (ID: {{fields.id}})"
        fields:
          - {label: "Product ID (Unique)", name: "id", widget: "string", required: true}
          - {label: "Product Name", name: "name", widget: "string", required: true}
          - label: "Category Tag"
            name: "category"
            widget: "select"
            options: ["Originals", "Fall", "Christmas", "LE"]
            required: true

          - label: "Apparel Types"
            name: "product_options"
            widget: "list"
            field: {label: "Type", widget: "string"}

          - label: "Available Colors"
            name: "colors"
            widget: "list"
            field: {label: "Color", widget: "string"}

          - label: "Image URLs"
            name: "imageUrls"
            widget: "list"
            field: {label: "Image URL", widget: "string"}
