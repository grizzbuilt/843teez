backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "store"
public_folder: "/store"

collections:
  - name: "store_products"
    label: "🛒 Store Products"
    files:
      - label: "Product Catalog"
        name: "products_file"
        file: "data/products.json"

        editor:
          preview: false

        fields:
          - label: "Product List"
            name: ""
            widget: "list"
            allow_add: true
            summary: "{{fields.name}} (ID: {{fields.id}})"

            fields:
              - label: "Product ID (Unique)"
                name: "id"
                widget: "string"
                required: true
                hint: "Example: C101, O105, LE101"

              - label: "Product Name"
                name: "name"
                widget: "string"
                required: true

              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - Originals
                  - Fall
                  - Christmas
                  - LE
                required: true

              - label: "Apparel Types"
                name: "product_options"
                widget: "list"
                field:
                  label: "Type"
                  name: "type"
                  widget: "select"
                  options:
                    - Tee_Shirt
                    - Sweatshirt
                    - Hoodie
                    - Baseball_Tee

              - label: "Available Colors"
                name: "colors"
                widget: "list"
                field:
                  label: "Color"
                  name: "color"
                  widget: "string"

              - label: "Image URLs"
                name: "imageUrls"
                widget: "list"
                field:
                  label: "Image URL"
