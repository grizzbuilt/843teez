backend:
  name: git-gateway
  branch: main # Verify this matches your GitHub/GitLab branch name
  
publish_mode: editorial_workflow

media_folder: "/store" # This should point to your image upload folder
public_folder: "/store"

# === COLLECTIONS DEFINITION (Your Products) ===
collections:
  - name: "store_products"
    label: "🛒 Store Products"
    folder: "data" # Correct folder location
    file: "products.json" # Correct file name

    editor:
      preview: false

    fields:
      - label: "Product List"
        name: "products"
        widget: "list"
        summary: "{{fields.name}} (ID: {{fields.id}})"
        
        fields:
          # Your schema follows here, ensuring correct widget names and options
          - {label: "Product ID (Unique)", name: "id", widget: "string", required: true}
          - {label: "Product Name", name: "name", widget: "string", required: true}
          - {label: "Category Tag", name: "category", widget: "select", options: ["Originals", "Fall", "Christmas", "LE"], required: true}
          # ... rest of the fields
