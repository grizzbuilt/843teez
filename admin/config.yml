backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "store"
public_folder: "/store"

collections:
  - name: "store_products"
    label: "🛒 Store Products"
    editor:
      preview: false

    files:
      - name: "product_data"
        label: "Products List"
        file: "data/products.json"
        format: "json"

        fields:
          - label: "Products"
            name: "products"
            widget: "list"
            allow_add: true
            collapsed: true
            summary: "<img src='{{fields.thumbnail}}' style='width:40px;height:40px;object-fit:cover;border-radius:6px;margin-right:8px;vertical-align:middle;'/> {{fields.name}} — {{fields.category}}"

            fields:

              - label: "Product ID"
                name: "id"
                widget: "string"
                required: true

              - label: "Product Name"
                name: "name"
                widget: "string"
                required: true

              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - "Originals"
                  - "Fall"
                  - "Christmas"
                  - "LE"
                required: true

              - label: "Product Types"
                name: "product_options"
                widget: "list"
                field:
                  label: ""
                  name: ""
                  widget: "string"

              - label: "Colors"
                name: "colors"
                widget: "list"
                field:
                  label: ""
                  name: ""
                  widget: "string"

              - label: "Thumbnail"
                name: "thumbnail"
                widget: "image"
                hint: "Main product preview image"

              - label: "Image URLs"
                name: "imageUrls"
                widget: "list"
                field:
                  label: ""
                  name: ""
                  widget: "string"
