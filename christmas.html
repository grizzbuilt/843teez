<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4PVF756J01"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date()); gtag('config', 'G-4PVF756J01');
    </script>

    <meta name="robots" content="noindex, follow">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <title>843 Teez | Christmas Collection</title>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fcff;
            background-image: url('https://843teez.com/surf-texture.png');
            background-size: 300px;
            background-repeat: repeat;
        }
        .btn-primary { background: #003466; }
        .btn-primary:hover { background: #007c9e; }
        .product-image-container { position: relative; cursor: pointer; }
        .image-overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.4);
            opacity: 0; transition: .3s;
            color: white; font-weight: bold;
            display:flex;align-items:center;justify-content:center;
        }
        .product-image-container:hover .image-overlay { opacity: 1; }
    </style>
</head>

<body class="min-h-screen p-4 sm:p-8 pt-16">

<div class="max-w-6xl mx-auto p-6 sm:p-10 md:p-12 bg-white/80 rounded-2xl shadow-xl backdrop-blur-sm">

<header class="text-center mb-8">
    <img src="/843teezlogo.png" class="max-w-xs mx-auto mb-4" />
    <h1 class="text-3xl font-extrabold text-[#007c9e]">Christmas Collection</h1>

    <a href="cart.html"
       id="global-view-cart-button"
       class="inline-flex bg-red-600 text-white font-bold px-3 py-1 mt-3 rounded-full shadow-md disabled:opacity-50"
       disabled>
        Cart (<span id="global-item-count">0</span>)
    </a>

    <nav class="mt-6 pt-4 border-t border-gray-300 font-bold text-[#003466]">
        <a href="store.html">🛒 All Designs</a> |
        <a href="originals.html">843 Teez Originals</a> |
        <a href="christmas.html" class="text-red-600 underline">Christmas</a> |
        <a href="fall.html">Fall</a> |
        <a href="limited_edition.html">Limited Edition</a>
    </nav>

    <div class="mt-4">
        <a href="/index.html" class="text-[#007c9e] hover:text-[#003466] font-semibold block">← Back to Main Site</a>
    </div>
</header>

<div class="grid grid-cols-1 lg:grid-cols-4 gap-8">

<div class="lg:col-span-3">
    <h2 class="text-2xl sm:text-3xl font-bold text-[#003466] mb-6 border-b pb-2">Apparel Designs</h2>
    <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
        <p class="text-gray-500 text-center col-span-3 pt-8">Loading Christmas products...</p>
    </div>
</div>

<div class="lg:col-span-1">
    <div class="sticky top-20 bg-white p-4 rounded-xl border-2 border-[#007c9e] shadow-lg text-center">
        <h3 class="text-lg font-bold text-[#003466] mb-3">Your Cart Summary</h3>
        <p class="text-sm text-gray-600 mb-2">
            Total Items: <span id="summary-item-count" class="font-bold text-[#007c9e]">0</span>
        </p>
        <p class="text-xl font-extrabold text-[#003466] mb-4">
            Est. Total: <span id="summary-cart-total">$0.00</span>
        </p>

        <a href="cart.html"
           id="view-cart-button"
           class="w-full inline-block text-white font-bold py-3 rounded-xl transition-all btn-primary disabled:opacity-50"
           disabled>
            Review & Checkout
        </a>
    </div>
</div>

</div>

<footer class="text-center mt-12 pt-6 border-t text-[#003466] text-xs font-semibold">
    <p>843 Teez™ is a <a href="https://grizzbuilt.com" class="text-[#007c9e] hover:underline" target="_blank">GrizzBuilt™</a> brand.</p>
</footer>

</div>

<script>
const CATEGORY_FILTER = "christmas";
const SIZES = ["S","M","L","XL","2XL","3XL","4XL","5XL"];

let cart = JSON.parse(localStorage.getItem("843teez_cart")) || [];
let allProducts = [];

const formatCurrency = x => `$${x.toFixed(2)}`;

const computePrice = (product, type, size) => {
    const base = product.base_prices[type] || 0;
    const up   = product.size_upcharges[size] || 0;
    return base + up;
};

const updateCartSummary = () => {
    let totalItems = 0, subtotal = 0;
    cart.forEach(i => { subtotal += i.price * i.qty; totalItems += i.qty; });

    const tax = subtotal * 0.08;

    document.getElementById("summary-item-count").textContent = totalItems;
    document.getElementById("summary-cart-total").textContent = formatCurrency(subtotal + tax);
    document.getElementById("global-item-count").textContent = totalItems;

    const btn = document.getElementById("view-cart-button");
    const headBtn = document.getElementById("global-view-cart-button");

    if (totalItems === 0) {
        btn.setAttribute("disabled","true");
        headBtn.setAttribute("disabled","true");
    } else {
        btn.removeAttribute("disabled");
        headBtn.removeAttribute("disabled");
    }
};

const addToCart = item => {
    const ex = cart.find(c =>
        c.id === item.id &&
        c.apparelType === item.apparelType &&
        c.color === item.color &&
        c.size === item.size
    );
    if (ex) ex.qty++;
    else cart.push(item);

    localStorage.setItem("843teez_cart", JSON.stringify(cart));
    updateCartSummary();
};

const initStore = async () => {
    const res = await fetch("/data/products.json?v=" + Date.now());
    const json = await res.json();
    allProducts = json.products || [];
    renderProducts();
    updateCartSummary();
};

const renderProducts = () => {
    const grid = document.getElementById("product-grid");
    const filtered = allProducts.filter(p => p.category.toLowerCase() === CATEGORY_FILTER);

    grid.innerHTML = filtered.map(product => {
        const lowest = Math.min(...Object.values(product.base_prices));

        return `
        <div class="bg-white p-4 rounded-xl shadow-lg border border-gray-100">

            <img src="${product.thumbnail || product.imageUrls[0]}" class="rounded-lg w-full mb-3">

            <h3 class="font-bold text-[#003466]">${product.name}</h3>
            <p class="text-[#007c9e] font-extrabold mb-2">Starting at ${formatCurrency(lowest)}</p>

            <label class="block text-xs font-bold mt-2">Style</label>
            <select class="w-full border rounded px-2 py-1 apparel-type">
                ${product.product_options.map(opt =>
                    `<option value="${opt}">
                        ${opt.replace(/_/g," ")} — ${formatCurrency(product.base_prices[opt])}
                    </option>`).join("")}
            </select>

            <label class="block text-xs font-bold mt-2">Color</label>
            <select class="w-full border rounded px-2 py-1 apparel-color">
                ${product.colors.map(c =>
                    `<option value="${c}">${c.replace(/_/g," ")}</option>`
                ).join("")}
            </select>

            <label class="block text-xs font-bold mt-2">Size</label>
            <select class="w-full border rounded px-2 py-1 apparel-size"></select>

            <button class="mt-4 w-full py-2 rounded-lg font-semibold text-white btn-primary add-to-cart">
                Add to Cart
            </button>
        </div>`;
    }).join("");

    attachEvents(filtered);
};

const attachEvents = (products) => {
    document.querySelectorAll(".bg-white").forEach((card, i) => {
        const product = products[i];
        const typeSel = card.querySelector(".apparel-type");
        const sizeSel = card.querySelector(".apparel-size");
        const colorSel = card.querySelector(".apparel-color");
        const addBtn = card.querySelector(".add-to-cart");

        const updateSizes = () => {
            const type = typeSel.value;
            sizeSel.innerHTML = SIZES.map(size => {
                const price = computePrice(product, type, size);
                const up = product.size_upcharges[size] || 0;
                return `<option value="${size}">
                    ${size}${up ? " (+$"+up+")" : ""} — ${formatCurrency(price)}
                </option>`;
            }).join("");
        };

        typeSel.addEventListener("change", updateSizes);
        updateSizes();

        addBtn.addEventListener("click", () => {
            const price = computePrice(product, typeSel.value, sizeSel.value);
            addToCart({
                id: product.id,
                name: product.name,
                apparelType: typeSel.value,
                color: colorSel.value,
                size: sizeSel.value,
                price,
                qty: 1
            });
        });
    });
};

window.onload = initStore;
</script>

</body>
</html>
